name: test

on:
  pull_request:
    branches:
      - "**"
    types:
      - edited
      - opened
      - ready_for_review
      - review_requested
      - synchronize
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: make test.unit

  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: paddler_client_python

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Run ruff
        run: make -C paddler_client_python ruff

      - name: Run mypy
        run: make -C paddler_client_python mypy

      - name: Run tests
        run: make -C paddler_client_python test
