name: test

on:
  pull_request:
    branches:
      - "**"
    types:
      - edited
      - opened
      - ready_for_review
      - review_requested
      - synchronize
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: make test.unit

  harness-cpu:
    name: harness (cpu)
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Run harness tests on CPU
        env:
          PADDLER_TEST_DEVICE: cpu
        run: make test

  harness-cuda:
    name: harness (cuda)
    runs-on: [self-hosted, cuda]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Run harness tests on CUDA
        env:
          PADDLER_TEST_DEVICE: cuda
        run: make test

  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: paddler_client_python

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run ruff
        run: poetry run ruff check

      - name: Run mypy
        run: poetry run mypy paddler_client/

      - name: Run tests
        run: poetry run pytest tests/ -v
