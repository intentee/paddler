name: release

on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]+
      - v[0-9].[0-9]+.[0-9]+-rc[0-9]+

jobs:
  resolve-version:
    name: resolve-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      name: ${{ steps.release-version.outputs.name }}
      description: ${{ steps.release-version.outputs.description }}
      type: ${{ steps.release-version.outputs.type }}
    steps:
      - id: release-version
        uses: intentee/release-action/release-tag-to-version@8125f727e97f72bfef24299d7c6d3217af1453bc
        with:
          release-tag: "${{ github.ref_name }}"

  build-cli:
    name: build-cli
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: paddler-bin-linux-libc2.35-amd64

          - os: ubuntu-latest
            artifact_name: paddler-bin-linux-libc2.39-amd64

          - os: macos-latest
            artifact_name: paddler-bin-macos-arm

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: build the cli binary
        run: make release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: rename the cli binary
        run: mv ./target/release/paddler ./${{ matrix.artifact_name }}
        shell: bash

      - name: assert cli version matches tag
        uses: intentee/release-action/assert-version@8125f727e97f72bfef24299d7c6d3217af1453bc
        with:
          filename: "./${{ matrix.artifact_name }}"
          expected-version: "${{ needs.resolve-version.outputs.version }}"

      - name: upload cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  build-gui:
    name: build-gui
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: paddler-gui-bin-linux-libc2.35-amd64

          - os: ubuntu-latest
            artifact_name: paddler-gui-bin-linux-libc2.39-amd64

          - os: macos-latest
            artifact_name: paddler-gui-bin-macos-arm

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install paddler_gui system dependencies (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev libxkbcommon-dev libwayland-dev libgl-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxcb1-dev libfontconfig-dev pkg-config
        shell: bash

      - name: build the gui binary
        run: make release.gui
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: rename the gui binary
        run: mv ./target/release/paddler_gui ./${{ matrix.artifact_name }}
        shell: bash

      - name: assert gui version matches tag
        uses: intentee/release-action/assert-version@8125f727e97f72bfef24299d7c6d3217af1453bc
        with:
          filename: "./${{ matrix.artifact_name }}"
          expected-version: "${{ needs.resolve-version.outputs.version }}"

      - name: upload gui artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  release:
    name: release
    needs: [resolve-version, build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: ${{ needs.resolve-version.outputs.name }}
          body: ${{ needs.resolve-version.outputs.description }}
          prerelease: ${{ needs.resolve-version.outputs.type == 'PRE_RELEASE' }}
          tag_name: ${{ github.ref }}
