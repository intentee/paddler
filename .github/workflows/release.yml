name: release

on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]+
      - v[0-9].[0-9]+.[0-9]+-rc[0-9]+

jobs:
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: paddler-bin-linux-libc2.35-amd64

          - os: ubuntu-latest
            artifact_name: paddler-bin-linux-libc2.39-amd64

          - os: macos-latest
            artifact_name: paddler-bin-macos-arm

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: build the binary
        run: make release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: release-version
        uses: intentee/release-action/release-tag-to-version@abdb835f34e49f5107b4569a381e0853c399797f
        with:
          release-tag: "${{ github.ref_name }}"

      - name: rename the binary
        run: mv ./target/release/paddler ./${{ matrix.artifact_name }}
        shell: bash

      - uses: intentee/release-action/assert-version@abdb835f34e49f5107b4569a381e0853c399797f
        with:
          filename: "./${{ matrix.artifact_name }}"
          expected-version: "${{ steps.release-version.outputs.version }}"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - id: release-version
        uses: intentee/release-action/release-tag-to-version@abdb835f34e49f5107b4569a381e0853c399797f
        with:
          release-tag: "${{ github.ref_name }}"

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ steps.release-version.outputs.type == 'PRE_RELEASE' }}
          tag_name: ${{ github.ref }}
